subtitle:
  empty:
    - "이번 달 가족카드는 조용했습니다. 명의자의 신용도와 혈압이 모두 평온합니다."
    - "가족카드 사용내역이 없습니다. 카드 주인이 괜히 안도해도 되는 달입니다."
    - "가족카드는 얌전하게 지나갔습니다. 한도는 살아 있고 명의자는 덜 예민합니다."
    - "이번 달 가족카드는 쉬었습니다. 카드 주인의 마음도 같이 쉬었습니다."
    - "가족카드가 조용합니다. 한도도 신용도도 평온한 표정입니다."
    - "사용내역이 없습니다. 카드 주인이 카드사 앱을 덜 열어도 되는 달입니다."
    - "가족카드가 휴식 모드입니다. 명의자의 심박수도 정상 범위입니다."
    - "이번 달 가족카드는 거의 등장하지 않았습니다. 한도는 무사합니다."
    - "가족카드가 얌전했습니다. 카드 주인의 불안도 출근하지 않았습니다."
    - "정리할 가족카드 내역이 없습니다. 평온한 공유 페이지입니다."
  joint_high:
    - "가족카드도 바빴고 명의자 카드도 바빴습니다. 이번 달 한도 사용률은 공동작품입니다."
    - "이건 한쪽만의 문제가 아닙니다. 가족카드와 명의자 카드가 함께 한도를 밀어 올렸습니다."
    - "사용자도 썼고 명의자도 썼습니다. 카드사는 흐뭇하고 한도는 피곤합니다."
    - "가족카드와 명의자 카드가 둘 다 바빴습니다. 한도 사용률이 같이 숨을 찹니다."
    - "이번 달은 공동 작업입니다. 가족카드도, 명의자 카드도 조용하지 않았습니다."
    - "한도 사용률은 함께 만든 결과입니다. 카드사는 미소 짓고 장부는 식은땀을 닦습니다."
    - "양쪽 카드가 모두 움직였습니다. 책임 소재보다 결제일이 더 현실적입니다."
    - "가족카드도 명의자 카드도 존재감을 보입니다. 한도는 공동으로 피곤합니다."
