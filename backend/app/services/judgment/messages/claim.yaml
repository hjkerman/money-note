    - "청구할 일이 없었습니다. 가족회계가 드물게 무소식으로 안부를 전합니다."
    - "이번 달 청구서는 백지에 가깝습니다. 평화가 숫자로 증명되었습니다."
    - "이번 달은 청구할 항목이 없습니다. 아들이 조용히 지나간 보기 드문 달입니다."
