    - "건강 관련 영수증이 평소보다 많았습니다. 크게 놀랄 일은 아니지만 몸이 의견을 자주 냈습니다."
    - "진료와 약국 기록이 여러 번 보입니다. 아들이 이번 달엔 몸을 조금 더 챙겨야 했습니다."
    - "건강 관련 지출이 많았습니다. 몸이 조용히 넘어가 주지 않은 달입니다."
    - "병원과 약국이 자주 보입니다. 아들이 이번 달은 수리 모드로 살았습니다."
    - "진료 기록이 여러 번 있습니다. 걱정은 줄이고, 회복은 챙기는 쪽으로 보겠습니다."
    - "건강 쪽 영수증이 제법 모였습니다. 몸이 잔소리 없이 바로 청구서를 보냈습니다."
    - "이번 달은 건강 관리가 자주 등장했습니다. 아들이 생각보다 정비가 필요한 기계였습니다."
    - "병원과 약국 기록이 눈에 띕니다. 크게 숨길 일은 아니고, 몸이 바빴습니다."
    - "건강 관련 항목이 많습니다. 아들이 사람이라 정기적으로 삐걱거립니다."
  medical_three:
