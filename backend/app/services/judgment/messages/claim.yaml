    - "의료 기록이 평소보다 조금 늘었습니다. 고장이라기보다는 점검에 가깝습니다."
    - "정기 관리에 작은 변수가 있었습니다. 그래도 청구서는 차분하게 정리했습니다."
    - "건강 관련 영수증이 조금 더 있습니다. 걱정보다는 관리의 영역입니다."
    - "아들이 이번 달엔 몸의 신호를 한 번 더 확인했습니다. 장부에는 얌전히 남았습니다."
  psychiatry:
    - "정신건강 정기 진료가 있었습니다. 사람은 가끔 마음도 정비하면서 굴러갑니다."
    - "마음의 정기점검이 예정대로 있었습니다. 특별한 일이라기보다 생활 유지보수입니다."
