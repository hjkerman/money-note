budget:
  empty:
    - "아직 기록이 없습니다. 예산심사위원회가 의사봉만 닦고 있습니다."
    - "장부가 고요합니다. 평화인지 기록 누락인지는 위원회도 아직 판단을 유보합니다."
    - "이번 달 첫 안건을 기다리는 중입니다. 무소비라면 위업이고 미기록이라면 곧 들통납니다."
    - "장부가 백지에 가깝습니다. 예산심사위원회가 회의실 불만 켜놓고 있습니다."
    - "아직 숫자가 들어오지 않았습니다. 평화라면 좋고, 까먹은 거라면 곧 현실이 옵니다."
    - "이번 달은 아직 조용합니다. 장부가 사용자의 기억력을 신뢰해도 되는지 심사 중입니다."
    - "기록이 없습니다. 소비가 없었던 건지, 기록이 도망간 건지는 추가 확인이 필요합니다."
    - "예산심사위원회가 안건 부족으로 대기 중입니다. 이런 고요함은 귀하지만 의심스럽습니다."
    - "장부가 아직 깨끗합니다. 깨끗한 장부와 깨끗한 소비생활은 가끔 다른 개념입니다."
    - "이번 달 숫자는 아직 출석 전입니다. 위원회가 출석부를 들고 기다립니다."
  liquidity_danger:
    - "익월 유동성이 마이너스입니다. 가족에게 적자 보전을 부탁해야 하는 상황이라 미안함과 회계적 참패가 동시에 기립했습니다."
    - "다음 달 장부가 이미 적자입니다. 가족에게 손을 벌리는 순간 예산심사위원회가 사용자를 증인석이 아니라 피고인석에 앉힙니다."
    - "익월 유동성 아래에 음수 표지판이 세워졌습니다. 가족에게 미안하다고 말할 준비와 본인 소비를 향한 준엄한 반성이 동시에 필요합니다."
    - "가족 보전 없이는 다음 달이 시작부터 휘청입니다. 사용자의 재정 판단은 오늘도 변명의 여지 없이 보강수업 대상입니다."
    - "다음 달 유동성이 지하로 내려갔습니다. 파산심사위원회가 계단을 내려가며 자료를 챙깁니다."
    - "익월 유동성이 적자입니다. 장부가 숫자로 사과문 초안을 작성하고 있습니다."
    - "다음 달 생존 예산이 부족합니다. 예산심사위원회가 농담을 접고 계산기를 정면으로 놓습니다."
    - "음수 유동성이 관측되었습니다. 사용자는 당장 반성문보다 보정 계획이 필요합니다."
    - "익월 유동성이 위험 구간입니다. 장부가 사용자에게 조용히 구조요청을 보냅니다."
    - "다음 달이 시작하기도 전에 기침을 합니다. 현금흐름은 친절하지만 봐주지는 않습니다."
  cash_outflow:
    - "카드보다 현금이 더 적극적으로 퇴장했습니다. 계좌가 별도 의견서를 제출했습니다."
    - "장부의 주연은 카드가 아니라 현금 유출입니다. 예산위원회가 통장 쪽으로 고개를 돌립니다."
    - "현금흐름이 소비 기록보다 큰 목소리를 냅니다. 보이지 않는 지출도 발언권은 있습니다."
    - "현금이 조용히 빠져나갔다고 생각했겠지만, 장부는 조용한 출구도 전부 세고 있습니다."
    - "계좌 쪽 움직임이 큽니다. 카드 명세서만 탓하기에는 통장이 이미 발언 신청을 했습니다."
    - "현금 유출이 주연 자리를 가져갔습니다. 예산심사위원회가 카드사 대신 은행 앱을 호출합니다."
    - "통장에서 빠져나간 금액이 존재감을 보입니다. 현금은 영수증보다 말수가 적지만 결과는 큽니다."
    - "현금흐름이 강하게 출구를 가리킵니다. 장부가 비상구 표지판을 켰습니다."
    - "카드 밖에서 돈이 움직였습니다. 예산위원회가 사각지대 순찰을 시작합니다."
    - "통장이 이번 달의 증인으로 채택되었습니다. 카드만 추궁해서는 사건이 끝나지 않습니다."
  frozen:
    - "쓴 돈보다 동결한 돈이 큽니다. 미래의 소비가 현재의 장부에서 대기번호를 받았습니다."
    - "동결 자산이 당월 지출보다 당당합니다. 아직 사지 않았다는 사실이 이번 달의 절약입니다."
    - "소비 후보군이 실제 소비보다 큽니다. 예산심사위원회가 결정을 미룬 용기를 높이 평가합니다."
    - "동결 항목이 존재감을 드러냅니다. 아직 결제하지 않은 미래가 현재 장부에 앉아 있습니다."
    - "사지 않은 물건들이 숫자로 줄을 섰습니다. 미룬 소비도 관리하면 자산처럼 보입니다."
    - "동결이 지출보다 앞섭니다. 욕망은 있었지만 카드가 아직 출근하지 않았습니다."
    - "미래 소비가 대기 중입니다. 예산위원회가 '보류' 도장을 꽤 만족스럽게 찍습니다."
    - "동결 항목이 많습니다. 아직 안 샀다는 사실 하나만으로도 오늘은 약간 이겼습니다."
    - "장부에 소비 후보들이 앉아 있습니다. 결제 전 숙고라는 매우 귀한 의식입니다."
    - "동결 자산이 큽니다. 이건 절약인지 예고편인지 위원회가 계속 관찰합니다."
  family_presence:
    - "본인 소비보다 가족회계의 존재감이 큽니다. 이번 달 장부는 개인전보다 단체전에 가깝습니다."
    - "청구와 가족카드가 당월 지출보다 활발합니다. 가족이라는 제도가 회계상으로도 실재합니다."
    - "가족 관련 숫자가 장부 전면에 나섰습니다. 신뢰는 유지되고 계산기는 바쁩니다."
    - "이번 달은 가족회계가 장부 앞줄에 앉았습니다. 개인 장부가 단체전으로 번졌습니다."
    - "가족 관련 금액이 선명합니다. 가계부가 갑자기 가족회의 자료처럼 보입니다."
    - "청구와 가족카드가 존재감을 가집니다. 돈은 개인 명의로 움직여도 사유는 가족적입니다."
    - "가족회계가 활발합니다. 장부가 혼자 사는 척하기를 포기했습니다."
    - "가족 관련 내역이 많습니다. 신뢰는 따뜻하고 계산은 차갑게 정확해야 합니다."
    - "이번 달 장부에는 가족이라는 항목이 크게 찍혔습니다. 관계도 숫자 앞에서는 정렬됩니다."
    - "개인 소비보다 가족 관련 흐름이 눈에 띕니다. 장부가 단체 사진을 찍고 있습니다."
  many_expenses:
    - "당월 지출 건수가 풍성합니다. 한 건 한 건은 생활이지만 합치면 행정입니다."
    - "소비 기록이 30건을 넘었습니다. 삶이 성실하게 영수증을 생산하고 있습니다."
    - "장부가 제법 두꺼워졌습니다. 예산심사위원회가 속독 능력을 요구받습니다."
    - "지출 건수가 많습니다. 생활이 작은 결제들로 자신을 증명했습니다."
    - "영수증이 줄을 섰습니다. 한 줄씩 보면 생활이고, 모아 보면 회의자료입니다."
    - "이번 달 기록이 부지런합니다. 돈이 많이 나갔는지 삶이 활발했는지 위원회가 구분 중입니다."
    - "지출 내역이 촘촘합니다. 장부가 사용자의 외출 빈도를 의심하기 시작합니다."
    - "결제 기록이 자주 등장합니다. 사용자는 생활했고 카드는 기억했습니다."
    - "건수가 많습니다. 예산심사위원회가 페이지 넘기는 소리를 냅니다."
    - "작은 지출들이 많이 쌓였습니다. 장부는 눈덩이의 물리학을 잘 알고 있습니다."
  cash_inflow:
    - "현금 유입이 당월 지출보다 큽니다. 예산심사위원회가 이례적으로 칭찬을 결재합니다."
    - "들어온 돈이 쓴 돈보다 우세합니다. 장부가 사용자에게 유리한 증언을 남깁니다."
    - "현재까지는 유입 우세입니다. 재정적 품위가 일시적으로 확인되었습니다."
    - "현금 유입이 좋습니다. 장부가 드물게 사용자 편에 서는 장면입니다."
    - "들어온 돈의 흐름이 힘을 냅니다. 예산위원회가 칭찬 문구를 찾느라 어색해합니다."
    - "현금흐름이 순조롭습니다. 통장이 이번 달에는 다소 협조적입니다."
    - "유입이 지출보다 앞섭니다. 장부가 모처럼 부드러운 표정을 짓습니다."
    - "이번 달 현금흐름은 방어력이 있습니다. 숫자가 사용자에게 유리한 증언을 합니다."
    - "들어온 돈이 존재감을 보입니다. 예산심사위원회가 잠시 인간적인 미소를 허용합니다."
    - "현금 유입이 좋습니다. 이런 날은 장부도 목소리가 낮아집니다."
  high_expense:
    - "당월 소비가 일곱 자리에 진입했습니다. 삶의 밀도가 카드 명세서에도 반영되었습니다."
    - "지출 총액이 백만 원을 넘었습니다. 경제에는 기여했고 위원회에는 안건을 제공했습니다."
    - "소비 활동이 매우 적극적입니다. 예산심사위원회가 설명자료의 글자 크기를 줄입니다."
    - "지출 규모가 큽니다. 카드 명세서가 생활의 대하소설처럼 보입니다."
    - "이번 달 소비가 무게를 가집니다. 위원회가 자료를 양면 인쇄합니다."
    - "소비 총액이 커졌습니다. 경제활동에는 성실했고 개인 장부에는 부담을 남겼습니다."
    - "지출이 크게 움직였습니다. 장부가 이달을 그냥 넘기지 않겠다고 합니다."
    - "소비가 적극적으로 전개되었습니다. 예산심사위원회가 증빙자료를 요청합니다."
    - "이번 달은 카드가 일을 많이 했습니다. 사용자는 삶을 살았고 장부는 그 대가를 적었습니다."
    - "지출 총액이 높습니다. 위원회가 '설명 가능'과 '납득 가능'을 구분하기 시작합니다."
  default:
    - "현재까지는 사람 사는 수준의 소란입니다. 예산심사위원회가 관찰 의견만 남깁니다."
    - "장부는 대체로 평온합니다. 소비는 있었고 재난으로 분류되지는 않았습니다."
    - "이번 달 재정은 설명 가능한 범위에서 움직이고 있습니다. 위원회는 일단 믿어보기로 합니다."
    - "기록이 쌓이고 있습니다. 숫자는 정직하며 아직 지나치게 공격적이지 않습니다."
    - "장부가 평범한 생활의 소리를 냅니다. 평범함은 재정에서 꽤 좋은 소식입니다."
    - "현재 상태는 관리 가능한 편입니다. 위원회가 의심은 하되 경보는 울리지 않습니다."
    - "소비가 있었고 삶도 있었습니다. 아직 재난으로 분류할 근거는 부족합니다."
    - "이번 달은 설명 가능한 움직임입니다. 장부가 일단 고개를 끄덕입니다."
    - "숫자가 적당히 움직입니다. 예산심사위원회가 관찰 모드로 남습니다."
    - "가계부가 정상적인 생활 소음을 기록 중입니다. 아직은 괜찮습니다."
credit:
  danger_80:
    - "추정 한도의 80%를 넘었습니다. 카드 명의자는 이제 금융상품이 아니라 금융기반시설입니다."
    - "한도 여백이 장식용으로 변했습니다. 신용평가라는 말이 서류가방을 들고 현관에 와 있습니다."
    - "가족카드가 한도를 생활공간처럼 사용 중입니다. 명의자의 평정심은 별도 예산으로 편성해야겠습니다."
    - "한도 사용률이 위험하게 높습니다. 카드사 앱을 열 때마다 심박수가 로그인됩니다."
    - "한도 여백이 희귀자원입니다. 장부가 카드 주인에게 심호흡을 권합니다."
    - "80% 선을 넘었습니다. 신용이라는 단어가 갑자기 정장을 입고 등장합니다."
    - "한도 사용률이 높습니다. 장부가 '아직 괜찮다'는 말을 쉽게 허락하지 않습니다."
    - "카드 한도가 빡빡합니다. 명의자의 침착함이 이번 달의 가장 비싼 자산입니다."
    - "추정 사용률이 높은 구간입니다. 카드사는 침착하고 사용자는 그렇지 않을 수 있습니다."
    - "한도 여유가 좁습니다. 예산심사위원회가 카드사 앱을 증거자료로 채택합니다."
  danger_50:
    - "추정치가 한도의 절반을 넘었습니다. 신용도라는 단어가 정장을 입고 회의실에 들어옵니다."
    - "한도의 과반이 사용되었습니다. 가족의 소비가 민주적 절차 없이 다수당이 되었습니다."
    - "50% 선을 넘었습니다. 카드 명의자의 침착함이 이번 달의 가장 큰 담보입니다."
    - "한도 절반을 넘겼습니다. 아직 끝장은 아니지만 장부는 목소리를 낮췄습니다."
    - "카드 사용률이 묵직합니다. 신용은 조용하고 명의자는 조용하지 않습니다."
    - "절반 이상 사용 중입니다. 카드사는 숫자로 말하고 장부는 한숨으로 번역합니다."
    - "한도 과반 구간입니다. 재정적 평정심에 방음 시설이 필요합니다."
    - "사용률이 절반을 넘었습니다. 위원회가 농담을 반으로 줄입니다."
    - "카드 한도 절반이 이미 회의장에 출석했습니다. 남은 절반도 긴장합니다."
    - "추정 사용률이 높습니다. 신용은 유지되지만 심리적 한도는 먼저 닳습니다."
  warning_30:
    - "추정치가 한도의 30%를 넘었습니다. 아직 사고는 아니지만, 카드 명의자의 표정은 회계감사 모드입니다."
